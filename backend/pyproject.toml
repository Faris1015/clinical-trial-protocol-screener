[project]
name = "protocol-screener"
version = "0.1.0"
description = "Multi-agent clinical trial protocol screener (LangGraph + FastAPI)"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "langgraph>=0.2",
    "langchain-ollama>=0.2",
    "langchain-anthropic>=0.3",
    "pydantic>=2.8",
    "pymupdf>=1.24",
    "pyyaml>=6.0",
    "faker>=28.0",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "httpx>=0.27", "ruff>=0.6"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backend"

[tool.setuptools.packages.find]
include = ["app*"]
