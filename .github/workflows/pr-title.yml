name: PR Title

# We squash-merge, so the PR title becomes the commit on main. Enforce
# Conventional Commits so the title is release-note-ready and a changelog
# can be generated later. A PR titled "stuff" fails this check.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with the allowed types in CONTRIBUTING.md.
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            perf
            build
            ci
            style
            revert
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: >
            The subject "{subject}" must start with a lowercase letter, e.g.
            "feat: add PR title check" not "feat: Add PR title check".
