name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on force-push / rapid pushes to the same ref, but
# never cancel main builds mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Format check (ruff)
        run: ruff format --check app tests
      - name: Typecheck (mypy)
        run: mypy
      - name: Tests + coverage
        # Coverage floor lives in pyproject ([tool.coverage.report] fail_under)
        # so it is one source of truth; #9 raises it to 80 once tests land.
        run: pytest -q --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Build
        run: npm run build