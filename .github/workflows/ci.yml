name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on force-push / rapid pushes to the same ref, but
# never cancel main builds mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege: this workflow only reads the repo. Installing deps runs
# untrusted transitive code, so don't hand it a write-capable GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Lock drift check (requirements.lock ⇄ pyproject.toml)
        # The Docker image installs from requirements.lock, but this job installs
        # from pyproject.toml — so a lock that has drifted out of sync (e.g. a
        # newly-added dep never compiled in) stays invisible to the test suite.
        # That gap shipped the aiosqlite/lockfile startup crash. Regenerate the
        # lock and fail on any diff. Reproducible because: Python 3.11 (matching
        # the runtime image), pinned pip-tools, and no --upgrade (existing pins
        # are preserved, so this only reacts to real pyproject changes).
        run: |
          pip install pip-tools==7.5.3
          pip-compile --quiet --output-file=requirements.lock --strip-extras pyproject.toml
          if ! git diff --exit-code requirements.lock; then
            echo "::error file=backend/requirements.lock::requirements.lock is out of sync with pyproject.toml. Regenerate: cd backend && pip-compile --output-file=requirements.lock --strip-extras pyproject.toml"
            exit 1
          fi
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Format check (ruff)
        run: ruff format --check app tests
      - name: Typecheck (mypy)
        run: mypy
      - name: Tests + coverage
        # Coverage floor lives in pyproject ([tool.coverage.report] fail_under)
        # so it is one source of truth; #9 raises it to 80 once tests land.
        run: pytest -q --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Build
        run: npm run build