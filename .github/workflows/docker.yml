name: Docker build

# Catches Dockerfile rot without paying the build cost on every PR: this
# workflow only triggers when container files or dependency manifests change.
on:
  pull_request:
    paths: &container_paths
      - "**/Dockerfile*"
      - "docker-compose*.yml"
      - "backend/pyproject.toml"
      - "frontend/package-lock.json"
      - ".github/workflows/docker.yml"
  push:
    branches: [main]
    paths: *container_paths

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (no push)
        run: docker build -t screener-backend backend
      - name: Assert backend image size < 300MB
        # Acceptance criterion for #11 — a slim runtime is the whole point of
        # the multi-stage build, so guard against regressions here. We measure
        # the compressed (pushed/pulled) size: it's the number that matters for
        # the GHCR registry and #13's rollout, and `docker save | gzip` gives a
        # deterministic result regardless of the runner's image-store backend
        # (`docker image inspect .Size` reports uncompressed on the classic
        # store but compressed on containerd — not portable).
        run: |
          bytes=$(docker save screener-backend | gzip -c | wc -c)
          mb=$((bytes / 1024 / 1024))
          echo "backend image (compressed): ${mb}MB"
          if [ "$mb" -ge 300 ]; then
            echo "::error::backend image ${mb}MB exceeds the 300MB budget"
            exit 1
          fi
      - name: Build frontend image (no push)
        run: docker build -t screener-frontend frontend