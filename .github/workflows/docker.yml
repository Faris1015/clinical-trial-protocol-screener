name: Docker build

# Catches Dockerfile rot without paying the build cost on every PR: this
# workflow only triggers when container files or dependency manifests change.
# PR-only by design — the PR is the gate to main, so the size budget + boot
# smoke run before every merge, and cd.yml owns the build+push on main (running
# both here would build the backend image twice per container-touching merge).
on:
  pull_request:
    paths:
      - "**/Dockerfile*"
      - "docker-compose*.yml"
      - "backend/pyproject.toml"
      # The image is built *from* the lock, so a lock-only change (e.g. a
      # regenerated pin set) must re-run the container build + smoke test.
      - "backend/requirements.lock"
      - "frontend/package-lock.json"
      - ".github/workflows/docker.yml"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege: builds images and smoke-tests them, never writes to the repo.
permissions:
  contents: read

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (no push)
        run: docker build -t screener-backend backend
      - name: Assert backend image size < 300MB
        # Acceptance criterion for #11 — a slim runtime is the whole point of
        # the multi-stage build, so guard against regressions here. We measure
        # the compressed (pushed/pulled) size: it's the number that matters for
        # the GHCR registry and #13's rollout, and `docker save | gzip` gives a
        # deterministic result regardless of the runner's image-store backend
        # (`docker image inspect .Size` reports uncompressed on the classic
        # store but compressed on containerd — not portable).
        run: |
          bytes=$(docker save screener-backend | gzip -c | wc -c)
          mb=$((bytes / 1024 / 1024))
          echo "backend image (compressed): ${mb}MB"
          if [ "$mb" -ge 300 ]; then
            echo "::error::backend image ${mb}MB exceeds the 300MB budget"
            exit 1
          fi
      - name: Smoke-test backend boots and serves /health
        # `docker build` above proves the image *builds*, but a missing runtime
        # dependency or an unwritable DB path only surfaces at *startup*, which a
        # build never exercises — exactly how the aiosqlite crash and the
        # root-owned /app path reached a green CI. Boot the real compose service
        # (--no-deps skips the ~4.7GB ollama pull; startup builds no LLM client)
        # and probe /health. compose reuses the layer cache from the build above.
        run: |
          docker compose up -d --no-deps backend
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          if [ "$ok" != 1 ]; then
            echo "::error::backend did not become healthy within 60s"
            docker compose logs backend
            docker compose down -v
            exit 1
          fi
          echo "backend healthy"
          docker compose down -v
      - name: Build frontend image (no push)
        run: docker build -t screener-frontend frontend