name: Build & publish images

# Merge to main → build and push the backend + frontend images to GHCR.
# Deployment itself is handled by the hosting platform's own auto-deploy from the
# repo (see docs/free-demo-deploy.md) — there is no deploy step here. CI (ci.yml)
# is the merge gate; this only runs post-merge.
on:
  push:
    branches: [main]

# Serialize runs on main behind one group so two quick merges don't race to push
# the same :latest tag.
concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write        # push images to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image prefix + short SHA
        id: vars
        # GHCR image names must be lowercase; github.repository can contain
        # uppercase (the owner is `Faris1015`), so lowercase it here.
        run: |
          echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          # GIT_SHA bakes the commit into the image so /health and /ready report
          # exactly which build is live.
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha }}
          tags: |
            ${{ steps.vars.outputs.prefix }}-backend:${{ steps.vars.outputs.sha }}
            ${{ steps.vars.outputs.prefix }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}-frontend:${{ steps.vars.outputs.sha }}
            ${{ steps.vars.outputs.prefix }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max