server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend service. The trailing paths are
    # preserved (no trailing slash on proxy_pass), so /api/screenings hits the
    # backend's /api/screenings unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE: the /stream endpoint is a long-lived event stream. Buffering
        # would hold events back until the connection closed, so disable it and
        # give the upstream a long read timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
    }

    # SPA fallback: unknown routes serve index.html so client-side rendering
    # owns routing, while real asset requests (200s) are served directly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
