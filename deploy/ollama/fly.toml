# Fly config for the dedicated Ollama inference service (private app).
#
# Provisioned ONCE, out of band from the per-merge CD — like the Postgres DB,
# it's stable infra, and a redeploy would drop in-flight inference. Deploy from
# this directory so the build context holds the Dockerfile + entrypoint:
#
#   cd deploy/ollama && flyctl deploy
#
# Redeploy the same way only when the wrapper or model tag changes. The model is
# cached on the mounted volume, so restarts are cheap after the first pull.
app = "screener-ollama"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  OLLAMA_MODEL = "llama3.1:8b"        # keep in sync with deploy/fly/backend.toml
  OLLAMA_HOST = "0.0.0.0:11434"

# Model weights persist here so a machine restart skips the ~4.7GB pull.
[mounts]
  source = "ollama_models"
  destination = "/root/.ollama"

# Private TCP service: the backend reaches it at screener-ollama.flycast:11434.
# No public ports are published (CD/setup allocates only a private IPv6).
[[services]]
  internal_port = 11434
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 11434

# Single machine: a volume can't be shared, and inference is stateless per
# request. Never bluegreen (would try to clone the volume) — replace in place.
[deploy]
  strategy = "immediate"

# llama3.1:8b needs real memory to run on CPU. Size up here; a shared-cpu VM
# will OOM or crawl. Adjust to your latency/cost tradeoff (or use a smaller
# OLLAMA_MODEL on both this app and the backend).
[[vm]]
  size = "performance-2x"
  memory = "8192mb"