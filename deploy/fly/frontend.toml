# Fly config for the frontend (nginx SPA + reverse proxy). This is the ONE
# public app — its URL is the live demo link. It proxies /api, /health, and
# /ready to the private backend over flycast (see frontend/default.conf.template).
#
# Deployed by CD with a pre-built GHCR image:
#   flyctl deploy --config deploy/fly/frontend.toml \
#     --image ghcr.io/<owner>/clinical-trial-protocol-screener-frontend:<sha>
app = "screener-frontend"
primary_region = "iad"

# No [build] section: CD always deploys a pre-built GHCR image via `--image`.

[env]
  # host[:port] of the backend on the private network. nginx renders this into
  # the config at startup via envsubst. flycast (default port 80) fronts the
  # backend's internal_port 8000.
  BACKEND_UPSTREAM = "screener-backend.flycast"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false          # keep both machines warm for zero-downtime
  auto_start_machines = true
  min_machines_running = 2

  # Static nginx: serving the SPA is the only liveness signal we need.
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/"

[deploy]
  strategy = "rolling"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"