# Fly config for the backend API (private app — no public IP).
#
# The image is supplied at deploy time by CD:
#   flyctl deploy --config deploy/fly/backend.toml \
#     --image ghcr.io/<owner>/clinical-trial-protocol-screener-backend:<sha>
#
# State lives in Fly Postgres (CHECKPOINT_BACKEND=postgres), so the app is fully
# stateless and runs >=2 machines — that plus the /ready health gate below is
# what makes the rolling deploy zero-downtime. Patient data is regenerated by
# the entrypoint on each boot (seeded → identical across replicas), so no volume
# is needed. Reached only via the frontend over flycast; see deploy/fly/frontend.toml.
app = "screener-backend"
primary_region = "iad"

# No [build] section: CD always deploys a pre-built GHCR image via `--image`.

[env]
  LLM_PROVIDER = "ollama"
  OLLAMA_BASE_URL = "http://screener-ollama.flycast:11434"
  OLLAMA_MODEL = "llama3.1:8b"        # keep in sync with deploy/fly/ollama.toml
  CHECKPOINT_BACKEND = "postgres"     # POSTGRES_DSN supplied as a secret (fly postgres attach)
  CORS_ORIGINS = "https://screener-frontend.fly.dev"
  LOG_FORMAT = "json"
  LOG_LEVEL = "INFO"

# Private HTTP service: flycast fronts it for the frontend app, health-aware and
# load-balanced across machines. No [http_service] public ports are published —
# CD runs `fly ips allocate-v6 --private` and leaves the app without a public IP.
[http_service]
  internal_port = 8000
  force_https = false                 # private network; TLS terminates at the frontend
  auto_stop_machines = false          # keep both machines warm for zero-downtime
  auto_start_machines = true
  min_machines_running = 2

  # Readiness gate (#6): during a rolling deploy Fly will not send traffic to —
  # or advance past — a new machine until it reports 200 here, and a machine
  # that never passes fails the release while the old machines keep serving.
  # /ready is 200 only when the LLM, rules, EHR, and Postgres are all reachable.
  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "15s"
    method = "GET"
    path = "/ready"

  # Cheap liveness probe: restarts a hung/crashed process without waiting on a
  # dependency blip (that's what /ready is for).
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Boot the new machine, wait for its checks to pass, then move to the next —
# one at a time so a majority stays in rotation throughout.
[deploy]
  strategy = "rolling"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"